# SLSA L4 Supply Chain: build API image on tag push, generate SBOM, keyless sign with Cosign.
name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/api:${{ github.ref_name }}

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository }}/api:${{ github.ref_name }}
          format: spdx-json
          artifact-name: sbom-api-${{ github.ref_name }}.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4

      - name: Keyless sign container image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ github.repository }}/api:${{ github.ref_name }}
