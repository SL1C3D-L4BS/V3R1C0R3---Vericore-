# HAProxy configuration for V3R1C0R3 API.
# Prepares for RFC 8326 BGP Graceful Shutdown: use kill -USR1 to trigger
# graceful GOAWAY-style drain (stop accepting new connections, drain existing).
#
# Graceful shutdown (zero-drop):
#   Send: kill -USR1 <haproxy_pid>
#   HAProxy then enters "drain" mode: no new connections to the process;
#   existing connections complete. BGP sessions can withdraw the route after
#   drain. Do NOT use kill -TERM until drain is complete.

global
  log /dev/log local0
  log /dev/log local1 notice
  chroot /var/lib/haproxy
  stats socket /run/haproxy/admin.sock mode 660 level admin
  stats timeout 30s
  user haproxy
  group haproxy
  daemon

defaults
  log     global
  mode    http
  option  httplog
  option  dontlognull
  retries 3
  # Timeouts for long-lived connections (WebSocket, streaming).
  timeout connect 10s
  timeout client  1h
  timeout server  1h
  timeout tunnel  1h
  timeout http-request 10s
  timeout http-keep-alive 10s

# Frontend: listen 80/443, balance to API backend.
# Graceful drain for maintenance (RFC 8326 / BGP withdrawal):
#   kill -USR1 <haproxy_master_pid>  ->  HAProxy stops accepting new connections
#   and drains existing ones (GOAWAY-style). Withdraw BGP after drain; then
#   kill -TERM when connections are zero. Never SIGKILL during drain.
frontend http_in
  bind *:80
  bind *:443 alpn h2,http/1.1
  default_backend api_servers

# API backend (Go monolith).
backend api_servers
  balance roundrobin
  option httpchk GET /health
  http-check expect status 200
  default-server check inter 5s fall 2 rise 1
  server api1 127.0.0.1:8080 check
  # server api2 127.0.0.1:8081 check
  # Add more servers for HA.

# Stats (optional).
listen stats
  bind *:8404
  stats enable
  stats uri /stats
  stats refresh 30s
  stats admin if TRUE
